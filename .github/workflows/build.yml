name: Auto build php:fpm-alpine with custom extensions

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * 0'
  push:
    branches:
      - 'main'
    paths:
      - Dockerfile
      - .github/workflows/**
permissions:
  contents: read

concurrency:
  group: php-build
  cancel-in-progress: true

jobs:
  auto_build_php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: whosneo/php
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDD'}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Custom PHP FPM
            org.opencontainers.image.description=PHP FPM with custom extensions
            org.opencontainers.image.source=https://github.com/whosneo/php
            org.opencontainers.image.vendor=whosneo
          cache-from: type=gha
          cache-to: type=gha,mode=max
